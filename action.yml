name: 'Tessl Smart Publish'
description: 'Review and publish a tessl tile, auto-bumping patch version when not manually changed'

inputs:
  review-threshold:
    description: 'Minimum review score (0-100). Set to 0 to skip review.'
    required: false
    default: '0'

runs:
  using: 'composite'
  steps:
    - name: Review skill
      if: inputs.review-threshold != '0'
      shell: bash
      run: tessl skill review --threshold ${{ inputs.review-threshold }}

    - name: Smart publish
      shell: bash
      run: |
        CURRENT=$(jq -r .version tile.json)
        PREVIOUS=$(git show HEAD~1:tile.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
        if [ "$CURRENT" != "$PREVIOUS" ]; then
          echo "Version manually bumped to $CURRENT — publishing as-is"
          tessl tile publish
        else
          echo "Version unchanged ($CURRENT) — auto-bumping patch"
          tessl tile publish --bump patch
        fi
